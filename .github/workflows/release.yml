name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Phase 1: Create the GitHub release (draft) and get its ID
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      version: ${{ steps.ver.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const ver = process.env.VERSION;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Monolite ${tag}`,
              body: [
                `## Install Monolite ${tag}`,
                '',
                'Download the file for your operating system below.',
                '',
                '| Platform | File to download |',
                '|---|---|',
                `| **macOS — Apple Silicon** (M1/M2/M3/M4) | \`Monolite_${ver}_aarch64.dmg\` |`,
                `| **macOS — Intel** | \`Monolite_${ver}_x64.dmg\` |`,
                `| **Windows** | \`Monolite_${ver}_x64-setup.exe\` |`,
                `| **Linux — Debian / Ubuntu** | \`monolite_${ver}_amd64.deb\` |`,
                `| **Linux — Other distros** | \`monolite_${ver}_amd64.AppImage\` |`,
                '',
                '### Installation notes',
                '- **macOS**: Open the `.dmg`, drag Monolite to Applications, and launch it. If you see "unidentified developer", right-click the app → Open.',
                '- **Windows**: Run the `.exe` installer. If Windows SmartScreen appears, click "More info" → "Run anyway".',
                '- **Linux `.deb`**: `sudo dpkg -i monolite_*_amd64.deb`',
                '- **Linux `.AppImage`**: `chmod +x monolite_*_amd64.AppImage` then run it directly — no install needed.',
              ].join('\n'),
              draft: true,
              prerelease: false,
            });
            core.setOutput('release_id', data.id);

  # Phase 2: Build on each platform and attach artifacts to the draft release
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install NSIS (Windows only)
        if: matrix.platform == 'windows-latest'
        run: winget install NSIS.NSIS --silent --accept-package-agreements --accept-source-agreements

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # Phase 3: Publish the draft once all builds succeed
  publish-release:
    needs: [create-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.RELEASE_ID,
              draft: false
            })
