name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          # macOS Intel
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          # Linux
          - platform: ubuntu-22.04
            args: ''
          # Windows
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Robinwater ${{ github.ref_name }}
          releaseBody: |
            ## Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `Robinwater_*_aarch64.dmg` |
            | macOS (Intel) | `Robinwater_*_x64.dmg` |
            | Windows | `Robinwater_*_x64-setup.exe` or `Robinwater_*_x64_en-US.msi` |
            | Linux (Debian/Ubuntu) | `robinwater_*_amd64.deb` |
            | Linux (AppImage) | `robinwater_*_amd64.AppImage` |

            Download the file for your platform, open it, and install normally.

            **macOS**: If you see "unidentified developer", right-click the app and choose Open.
            **Windows**: If Windows SmartScreen appears, click "More info" → "Run anyway".
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
